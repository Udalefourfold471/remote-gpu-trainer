name: New platform profile
description: Contribute or request a profile for a platform not yet covered.
title: "[profile] <platform name>"
labels: ["new-profile"]
body:
  - type: markdown
    attributes:
      value: |
        Profiles follow the 8-field schema in profiles/_schema.md. You don't have to fill every field —
        even a partial, sourced draft helps.
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Name + URL.
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - ssh-rental
        - cloud-api
        - kubernetes
        - slurm
        - other
  - type: textarea
    id: teardown
    attributes:
      label: Teardown / billing (the highest-stakes field)
      description: What stops the meter (stop / terminate / destroy / release), what each preserves, what is irreversible, and any cost trap.
    validations:
      required: true
  - type: textarea
    id: rest
    attributes:
      label: Other fields you know
      description: launch · storage survival-matrix · network/mirror · spot/resume · daemon · gotchas · script overrides.
  - type: input
    id: source
    attributes:
      label: Source
      description: Docs URL, or "I use this platform".
